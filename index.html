<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#120718" />
    <title>Для Назель — подарок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shell">
      <canvas id="canvas"></canvas>

      <div id="introOverlay" class="overlay active">
        <div class="prompt-card">
          <div class="prompt-title">Пожалуйста, поверни телефон</div>
          <div class="prompt-subtitle">Чтобы особое поздравление началось плавно.</div>
          <div class="prompt-hint">↻</div>
        </div>
      </div>

      <div id="videoContainer" class="overlay">
        <video id="videoPlayer" playsinline webkit-playsinline></video>
        <iframe
          id="videoIframe"
          class="hidden-element"
          allow="autoplay; fullscreen; picture-in-picture"
          frameborder="0"
          allowfullscreen
        ></iframe>
      </div>

      <div id="explosionOverlay" class="overlay"></div>

      <div id="uiArea" class="ui-areas hidden">
        <div class="layer top-controls">
          <button id="musicButton" class="control">♪ Музыка</button>
          <button id="restartButton" class="control">↻ Повторить</button>
        </div>

        <div class="layer content">
          <div class="headline">
            <p class="intro">Для Назель</p>
            <h1>Ты — мое чудо</h1>
            <p class="description">Нежное поздравление, которое собирает свет, лепестки и сердце.</p>
          </div>
          <div id="wordGrid" class="word-grid"></div>
        </div>
      </div>
    </div>

    <audio id="music" preload="auto"></audio>
    <script src="script.js"></script>
  </body>
</html>
