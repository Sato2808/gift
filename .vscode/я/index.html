<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ff4f81" />
    <title>С Днем Рождения, Назель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <canvas id="sceneCanvas"></canvas>
      <div class="overlay-glow"></div>
      <div class="ui-layer">
        <div class="controls">
          <button id="musicToggle" type="button">♪ Музыка</button>
          <button id="restartButton" type="button">↺ Повторить</button>
        </div>
        <div id="sceneMessage" class="scene-message"></div>
      </div>
    </div>

    <audio id="bgMusic" preload="auto" loop></audio>

    <script src="script.js"></script>
  </body>
</html>
